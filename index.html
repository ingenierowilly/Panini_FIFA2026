<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Álbum Panini FIFA World Cup 2026</title>
<meta name="application-name" content="Panini FIFA 2026">
<meta name="description" content="Rastrea tu álbum Panini FIFA World Cup 2026 — 993 láminas, 48 equipos.">
<meta name="theme-color" content="#050F28">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Panini 2026">
<meta name="msapplication-TileColor" content="#050F28">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

html, body { overscroll-behavior: none; overscroll-behavior-y: none; }
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #050F28;
  --bg2:      #071436;
  --bg3:      #091850;
  --gold:     #FFD700;
  --gold2:    #FFA500;
  --blue:     #003049;
  --blue2:    #023E7D;
  --green:    #2DC653;
  --red:      #C1121F;
  --orange:   #F59E0B;
  --white:    #F0F4FF;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══ WELCOME ══════════════════════════════════════════════ */
#sw {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
  background: radial-gradient(ellipse at 50% 0%, #0A2060 0%, #050F28 60%, #020810 100%);
  position: relative; overflow: hidden;
}
.stars-bg {
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,215,0,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 8%,  rgba(255,215,0,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 25%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 12%, rgba(255,215,0,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 65%, rgba(255,215,0,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 55%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 70%, rgba(255,215,0,.5) 0%, transparent 100%),
    radial-gradient(2px 2px at 35% 80%, rgba(255,215,0,.6) 0%, transparent 100%),
    radial-gradient(2px 2px at 65% 85%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 5%  90%, rgba(255,215,0,.3) 0%, transparent 100%);
}
.trophy { font-size: 72px; filter: drop-shadow(0 0 24px rgba(255,215,0,.7)); animation: float 3s ease-in-out infinite; margin-bottom: 8px; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.wtitle {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(38px, 9vw, 76px);
  letter-spacing: 4px; text-align: center; line-height: 1;
  background: linear-gradient(135deg, #FFD700, #FF8C00, #FFD700);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 6px;
}
.wsub {
  font-family: 'Oswald', sans-serif; font-size: clamp(12px,2.5vw,17px);
  color: rgba(255,255,255,.55); letter-spacing: 5px; text-transform: uppercase;
  margin-bottom: 36px; text-align: center;
}
.wcard {
  background: rgba(255,255,255,.05); backdrop-filter: blur(24px);
  border: 1px solid rgba(255,215,0,.2); border-radius: 22px;
  padding: 34px 38px; width: 100%; max-width: 420px; text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
}
.wcard label { font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; display:block; margin-bottom:10px; }
.wcard input {
  width:100%; background:rgba(255,255,255,.07); border:2px solid rgba(255,215,0,.25);
  border-radius:12px; padding:14px 18px; font-family:'Inter',sans-serif; font-size:18px;
  color:white; text-align:center; outline:none; transition:border-color .3s; margin-bottom:18px;
}
.wcard input:focus { border-color:var(--gold); background:rgba(255,215,0,.05); }
.wcard input::placeholder { color:rgba(255,255,255,.25); }
.stat-row { display:flex; gap:16px; margin-top:22px; justify-content:center; }
.sbadge { text-align:center; padding:10px 14px; background:rgba(255,255,255,.04); border-radius:10px; border:1px solid rgba(255,255,255,.08); }
.sbadge .n { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--gold); display:block; }
.sbadge .l { font-size:9px; color:rgba(255,255,255,.45); letter-spacing:1px; text-transform:uppercase; }
.bprimary {
  width:100%; padding:15px; background:linear-gradient(135deg,#FFD700,#FF8C00);
  color:#010B1F; font-family:'Oswald',sans-serif; font-size:17px; font-weight:700;
  letter-spacing:3px; text-transform:uppercase; border:none; border-radius:12px;
  cursor:pointer; transition:transform .2s,box-shadow .2s;
}
.bprimary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,165,0,.4); }

/* ══ MAIN ══════════════════════════════════════════════════ */
#sm { display:none; }

.topbar {
  background: linear-gradient(135deg, #040E26, #071436);
  border-bottom: 3px solid var(--gold);
  padding: 0 20px; position:sticky; top:0; z-index:100;
  box-shadow: 0 4px 24px rgba(0,0,0,.7);
}
.topbar-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:11px 0; gap:12px; flex-wrap:wrap; }
.tlogo { display:flex; align-items:center; gap:10px; }
.tlogo .em { font-size:26px; }
.tlogo .tt { font-family:'Bebas Neue',sans-serif; font-size:21px; letter-spacing:2px; color:var(--gold); line-height:1; }
.tlogo .tn { font-size:10px; color:rgba(255,255,255,.5); font-family:'Inter',sans-serif; letter-spacing:1px; }
.prog-wrap { flex:1; min-width:180px; max-width:320px; }
.prog-lbl { display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px; color:rgba(255,255,255,.6); }
.prog-out { height:7px; background:rgba(255,255,255,.08); border-radius:4px; overflow:hidden; }
.prog-in { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); border-radius:4px; transition:width .5s ease; }
.tstats { display:flex; gap:6px; }
.tstat { text-align:center; padding:4px 8px; border-radius:8px; min-width:50px; }
.tstat.have { background:rgba(45,198,83,.12); border:1px solid rgba(45,198,83,.25); }
.tstat.rep  { background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.25); }
.tstat.miss { background:rgba(193,18,31,.12); border:1px solid rgba(193,18,31,.25); }
.tstat .n { font-family:'Bebas Neue',sans-serif; font-size:19px; display:block; line-height:1; }
.tstat.have .n { color:var(--green); } .tstat.rep .n { color:var(--orange); } .tstat.miss .n { color:var(--red); }
.tstat .l { font-size:8px; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,.4); }

.ctrlbar { background:rgba(5,15,40,.85); border-bottom:1px solid rgba(255,255,255,.06); padding:10px 20px; position:sticky; top:68px; z-index:90; backdrop-filter:blur(12px); }
.ctrl-inner { max-width:1200px; margin:0 auto; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.sbox { flex:1; min-width:150px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); border-radius:9px; padding:8px 13px; color:white; font-family:'Inter',sans-serif; font-size:13px; outline:none; }
.sbox:focus { border-color:var(--gold); } .sbox::placeholder { color:rgba(255,255,255,.28); }
.fbtn { padding:7px 12px; border-radius:7px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:rgba(255,255,255,.65); font-family:'Inter',sans-serif; font-size:12px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.fbtn.fa { background:var(--gold); color:#010B1F; border-color:var(--gold); font-weight:700; }
.fbtn.fg { background:var(--green); color:white; border-color:var(--green); font-weight:700; }
.fbtn.fo { background:var(--orange); color:white; border-color:var(--orange); font-weight:700; }
.fbtn.fr { background:var(--red); color:white; border-color:var(--red); font-weight:700; }
.bshare { padding:7px 14px; background:linear-gradient(135deg,#4F46E5,#7C3AED); color:white; border:none; border-radius:7px; font-family:'Inter',sans-serif; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all .2s; }
.bshare:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(79,70,229,.4); }
.bhome { padding:7px 12px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.6); border-radius:7px; font-family:'Inter',sans-serif; font-size:12px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.bhome:hover { background:rgba(255,215,0,.12); border-color:rgba(255,215,0,.3); color:var(--gold); }

.mcontent { max-width:1200px; margin:0 auto; padding:18px; }

.sec-block { margin-bottom:4px; }
.sec-hdr { display:flex; align-items:center; gap:12px; margin-bottom:12px; margin-top:26px; padding-bottom:9px; border-bottom:2px solid rgba(255,215,0,.15); }
.sec-flag { font-size:26px; }
.sec-title { font-family:'Oswald',sans-serif; font-size:19px; font-weight:600; color:var(--white); letter-spacing:.5px; }
.sec-code { font-family:'Bebas Neue',sans-serif; font-size:13px; color:var(--gold); background:rgba(255,215,0,.08); padding:2px 8px; border-radius:4px; letter-spacing:2px; border:1px solid rgba(255,215,0,.2); }
.sec-prog { margin-left:auto; font-size:11px; color:rgba(255,255,255,.4); white-space:nowrap; }

.sgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(56px,1fr)); gap:5px; }

/* STICKER CARD */
.stk {
  position:relative; aspect-ratio:.72; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:2px solid rgba(255,255,255,.08);
  background: linear-gradient(160deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.02) 100%);
  transition:all .15s; user-select:none; overflow:hidden;
}
.stk:hover { transform:translateY(-2px); border-color:rgba(255,215,0,.4); box-shadow:0 4px 12px rgba(0,0,0,.4); }
.stk.have {
  background: linear-gradient(160deg, rgba(45,198,83,.18) 0%, rgba(45,198,83,.08) 100%);
  border-color:rgba(45,198,83,.55);
}
.stk.rep {
  background: linear-gradient(160deg, rgba(245,158,11,.2) 0%, rgba(245,158,11,.08) 100%);
  border-color:rgba(245,158,11,.65);
}
.stk-code { font-family:'Bebas Neue',sans-serif; font-size:12px; color:rgba(255,255,255,.4); line-height:1.1; text-align:center; padding:2px; }
.stk.have .stk-code { color:rgba(255,255,255,.85); }
.stk.rep  .stk-code { color:rgba(255,220,100,.9); }
.stk-chk { position:absolute; top:2px; right:3px; font-size:9px; display:none; }
.stk.have .stk-chk { display:block; }
.rep-badge { position:absolute; top:2px; left:2px; background:var(--orange); color:#010B1F; font-size:7px; font-weight:800; border-radius:3px; padding:1px 3px; display:none; font-family:'Inter',sans-serif; line-height:1.3; }
.stk.rep .rep-badge { display:block; }

.sec-block.hidden { display:none; }
.stk.hidden { display:none; }

/* ══ MODALS ════════════════════════════════════════════════ */
.moverlay { position:fixed; inset:0; background:rgba(0,0,0,.82); backdrop-filter:blur(8px); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
.moverlay.open { display:flex; }
.modal {
  background: linear-gradient(145deg, #0B1D4A, #070F28);
  border:1px solid rgba(255,215,0,.25); border-radius:20px;
  width:100%; max-width:400px; padding:26px; position:relative;
  box-shadow:0 16px 60px rgba(0,0,0,.7);
}
.mclose { position:absolute; top:13px; right:15px; background:none; border:none; color:rgba(255,255,255,.4); font-size:21px; cursor:pointer; line-height:1; }
.m-code { font-family:'Bebas Neue',sans-serif; font-size:46px; color:var(--gold); line-height:1; }
.m-team { font-size:12px; color:rgba(255,255,255,.38); margin-bottom:18px; margin-top:2px; }
.m-actions { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:16px; }
.abtn { padding:11px; border-radius:10px; border:2px solid transparent; font-family:'Oswald',sans-serif; font-size:14px; font-weight:600; letter-spacing:1px; cursor:pointer; transition:all .2s; text-transform:uppercase; }
.abtn.bhave { background:rgba(45,198,83,.1); border-color:rgba(45,198,83,.4); color:var(--green); }
.abtn.bhave.sel { background:var(--green); color:white; border-color:var(--green); }
.abtn.bmiss { background:rgba(193,18,31,.1); border-color:rgba(193,18,31,.35); color:#FF7070; }
.abtn.bmiss.sel { background:var(--red); color:white; border-color:var(--red); }
.rep-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.rep-row label { font-family:'Oswald',sans-serif; font-size:12px; color:rgba(255,255,255,.5); letter-spacing:1px; flex:1; text-transform:uppercase; }
.rctr { display:flex; align-items:center; gap:8px; }
.cbtn { width:30px; height:30px; border-radius:7px; border:1px solid rgba(255,215,0,.25); background:rgba(255,215,0,.08); color:var(--gold); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.cval { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--gold); min-width:26px; text-align:center; }
.trade-fields { display:none; }
.trade-fields.vis { display:block; }
.trade-fields label { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:2px; color:rgba(255,255,255,.4); text-transform:uppercase; display:block; margin-bottom:5px; margin-top:11px; }
.trade-fields input { width:100%; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:7px; padding:9px 11px; color:white; font-family:'Inter',sans-serif; font-size:13px; outline:none; }
.trade-fields input:focus { border-color:var(--gold); }
.trade-fields input::placeholder { color:rgba(255,255,255,.2); }
.bsave { width:100%; padding:13px; background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#010B1F; border:none; border-radius:10px; font-family:'Oswald',sans-serif; font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-top:14px; transition:all .2s; }
.bsave:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(255,165,0,.35); }

.share-opts { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin:16px 0; }
.sopt { padding:13px 8px; border-radius:11px; border:2px solid rgba(255,255,255,.09); background:rgba(255,255,255,.04); color:rgba(255,255,255,.65); font-family:'Oswald',sans-serif; font-size:13px; font-weight:600; cursor:pointer; text-align:center; transition:all .2s; text-transform:uppercase; }
.sopt:hover { border-color:var(--gold); color:var(--gold); }
.sopt.sel { border-color:var(--gold); background:rgba(255,215,0,.08); color:var(--gold); }
.sopt .si { font-size:22px; display:block; margin-bottom:4px; }
#cv-preview { width:100%; border-radius:9px; border:1px solid rgba(255,255,255,.08); margin-top:12px; display:none; }
.bdl { width:100%; padding:13px; background:linear-gradient(135deg,#4F46E5,#7C3AED); color:white; border:none; border-radius:10px; font-family:'Oswald',sans-serif; font-size:15px; font-weight:700; letter-spacing:2px; cursor:pointer; margin-top:10px; display:none; transition:all .2s; text-transform:uppercase; }
.bdl:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(79,70,229,.4); }
canvas { display:none; }

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:rgba(255,255,255,.02); }
::-webkit-scrollbar-thumb { background:rgba(255,215,0,.25); border-radius:3px; }

@media(max-width:600px){
  .sgrid { grid-template-columns:repeat(auto-fill,minmax(48px,1fr)); gap:4px; }
  .tstats { gap:4px; } .tstat { min-width:42px; padding:3px 5px; } .tstat .n { font-size:17px; }
  .wcard { padding:26px 22px; }
}
</style>
</head>
<body>

<!-- ══ WELCOME ══ -->
<div id="sw">
  <div class="stars-bg"></div>
  <div class="trophy">🏆</div>
  <div class="wtitle">FIFA WORLD CUP 2026</div>
  <div class="wsub">Álbum Panini · 993 Láminas</div>
  <div class="wcard">
    <label>¿Cuál es tu nombre, coleccionista?</label>
    <input type="text" id="inp-name" placeholder="Tu nombre aquí..." maxlength="30" autocomplete="off">
    <button class="bprimary" onclick="enterMain()">⚽ EMPEZAR A COLECCIONAR</button>
    <div class="stat-row">
      <div class="sbadge"><span class="n">993</span><span class="l">Láminas</span></div>
      <div class="sbadge"><span class="n">48</span><span class="l">Equipos</span></div>
      <div class="sbadge"><span class="n">50</span><span class="l">Secciones</span></div>
    </div>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div id="sm">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="tlogo">
        <span class="em">⚽</span>
        <div><div class="tt">FIFA 2026 · Panini</div><div class="tn" id="disp-name"></div></div>
      </div>
      <div class="prog-wrap">
        <div class="prog-lbl"><span>Progreso</span><span id="pct-lbl">0%</span></div>
        <div class="prog-out"><div class="prog-in" id="prog-bar" style="width:0%"></div></div>
      </div>
      <div class="tstats">
        <div class="tstat have"><span class="n" id="cnt-have">0</span><span class="l">Tengo</span></div>
        <div class="tstat rep"><span class="n" id="cnt-rep">0</span><span class="l">Repet.</span></div>
        <div class="tstat miss"><span class="n" id="cnt-miss">993</span><span class="l">Faltan</span></div>
      </div>
    </div>
  </div>
  <div class="ctrlbar">
    <div class="ctrl-inner">
      <input type="text" class="sbox" id="sbox" placeholder="🔍 Buscar código o equipo..." oninput="applyFilters()">
      <button class="fbtn fa" id="f-all"  onclick="setFilter('all')">Todas</button>
      <button class="fbtn"    id="f-have" onclick="setFilter('have')">✅ Tengo</button>
      <button class="fbtn"    id="f-rep"  onclick="setFilter('repeat')">🔁 Repet.</button>
      <button class="fbtn"    id="f-miss" onclick="setFilter('missing')">❌ Faltan</button>
      <button class="bhome" onclick="goHome()">🏠 Inicio</button>
      <button class="bshare" onclick="openShare()">📤 Compartir</button>
    </div>
  </div>
  <div class="mcontent" id="mcontent"></div>
</div>

<!-- ══ STICKER MODAL ══ -->
<div class="moverlay" id="stk-modal">
  <div class="modal">
    <button class="mclose" onclick="closeModal()">✕</button>
    <div class="m-code" id="m-code">COL1</div>
    <div class="m-team" id="m-team">🇨🇴 Colombia</div>
    <div class="m-actions">
      <button class="abtn bhave" id="btn-have" onclick="toggleHave()">✅ La tengo</button>
      <button class="abtn bmiss sel" id="btn-miss" onclick="toggleMiss()">❌ Me falta</button>
    </div>
    <div class="rep-row">
      <label>Repetidas</label>
      <div class="rctr">
        <button class="cbtn" onclick="chgRep(-1)">−</button>
        <span class="cval" id="rep-val">0</span>
        <button class="cbtn" onclick="chgRep(1)">+</button>
      </div>
    </div>
    <div class="trade-fields" id="trade-f">
      <label>Cambio con quién</label>
      <input type="text" id="t-with" placeholder="Nombre de tu amigo..." maxlength="40">
      <label>Por qué lámina</label>
      <input type="text" id="t-for"  placeholder="Ej: COL7, ARG10..." maxlength="40">
    </div>
    <button class="bsave" onclick="saveStk()">💾 GUARDAR</button>
  </div>
</div>

<!-- ══ SHARE MODAL ══ -->
<div class="moverlay" id="share-modal">
  <div class="modal" style="max-width:500px">
    <button class="mclose" onclick="closeShare()">✕</button>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:27px;color:var(--gold);margin-bottom:3px">📤 GENERAR IMAGEN</div>
    <div style="font-size:12px;color:rgba(255,255,255,.4)">Crea una cuadrícula para compartir</div>
    <div class="share-opts">
      <div class="sopt" id="so-miss" onclick="selShare('missing')"><span class="si">❌</span>Faltan</div>
      <div class="sopt" id="so-have" onclick="selShare('have')"><span class="si">✅</span>Tengo</div>
      <div class="sopt" id="so-rep"  onclick="selShare('repeat')"><span class="si">🔁</span>Repet.</div>
    </div>
    <button class="bprimary" onclick="genImg()" style="margin-bottom:0">🎨 GENERAR IMAGEN</button>
    <canvas id="share-cv"></canvas>
    <img id="cv-preview" alt="Vista previa">
    <a id="dl-a" style="display:none"><button class="bdl" id="dl-btn">⬇️ DESCARGAR IMAGEN</button></a>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// ALBUM — estructura exacta del PDF plantilla oficial Panini
// FWC1-FWC8 | 48 equipos x20 | FWC9-FWC19 | CC1-CC14 = 993
// ═══════════════════════════════════════════════════════════
const ALBUM = [
  {c:"FWC", f:"🏆", n:"FIFA World Cup – Historia",           t:8},
  {c:"MEX", f:"🇲🇽", n:"México",                             t:20},
  {c:"RSA", f:"🇿🇦", n:"Sudáfrica",                          t:20},
  {c:"KOR", f:"🇰🇷", n:"Corea del Sur",                      t:20},
  {c:"CZE", f:"🇨🇿", n:"Chequia",                            t:20},
  {c:"CAN", f:"🇨🇦", n:"Canadá",                             t:20},
  {c:"BIH", f:"🇧🇦", n:"Bosnia-Herzegovina",                 t:20},
  {c:"QAT", f:"🇶🇦", n:"Qatar",                              t:20},
  {c:"SUI", f:"🇨🇭", n:"Suiza",                              t:20},
  {c:"BRA", f:"🇧🇷", n:"Brasil",                             t:20},
  {c:"MAR", f:"🇲🇦", n:"Marruecos",                          t:20},
  {c:"HAI", f:"🇭🇹", n:"Haití",                              t:20},
  {c:"SCO", f:"🏴󠁧󠁢󠁳󠁣󠁴󠁿", n:"Escocia",                            t:20},
  {c:"USA", f:"🇺🇸", n:"Estados Unidos",                     t:20},
  {c:"PAR", f:"🇵🇾", n:"Paraguay",                           t:20},
  {c:"AUS", f:"🇦🇺", n:"Australia",                          t:20},
  {c:"TUR", f:"🇹🇷", n:"Turquía",                            t:20},
  {c:"GER", f:"🇩🇪", n:"Alemania",                           t:20},
  {c:"CUW", f:"🇨🇼", n:"Curazao",                            t:20},
  {c:"CIV", f:"🇨🇮", n:"Costa de Marfil",                    t:20},
  {c:"ECU", f:"🇪🇨", n:"Ecuador",                            t:20},
  {c:"NED", f:"🇳🇱", n:"Países Bajos",                       t:20},
  {c:"JPN", f:"🇯🇵", n:"Japón",                              t:20},
  {c:"SWE", f:"🇸🇪", n:"Suecia",                             t:20},
  {c:"TUN", f:"🇹🇳", n:"Túnez",                              t:20},
  {c:"BEL", f:"🇧🇪", n:"Bélgica",                            t:20},
  {c:"EGY", f:"🇪🇬", n:"Egipto",                             t:20},
  {c:"IRN", f:"🇮🇷", n:"Irán",                               t:20},
  {c:"NZL", f:"🇳🇿", n:"Nueva Zelanda",                      t:20},
  {c:"ESP", f:"🇪🇸", n:"España",                             t:20},
  {c:"CPV", f:"🇨🇻", n:"Cabo Verde",                         t:20},
  {c:"KSA", f:"🇸🇦", n:"Arabia Saudita",                     t:20},
  {c:"URU", f:"🇺🇾", n:"Uruguay",                            t:20},
  {c:"FRA", f:"🇫🇷", n:"Francia",                            t:20},
  {c:"SEN", f:"🇸🇳", n:"Senegal",                            t:20},
  {c:"IRQ", f:"🇮🇶", n:"Irak",                               t:20},
  {c:"NOR", f:"🇳🇴", n:"Noruega",                            t:20},
  {c:"ARG", f:"🇦🇷", n:"Argentina",                          t:20},
  {c:"ALG", f:"🇩🇿", n:"Argelia",                            t:20},
  {c:"AUT", f:"🇦🇹", n:"Austria",                            t:20},
  {c:"JOR", f:"🇯🇴", n:"Jordania",                           t:20},
  {c:"POR", f:"🇵🇹", n:"Portugal",                           t:20},
  {c:"COD", f:"🇨🇩", n:"Rep. Dem. del Congo",                t:20},
  {c:"UZB", f:"🇺🇿", n:"Uzbekistán",                         t:20},
  {c:"COL", f:"🇨🇴", n:"Colombia",                           t:20},
  {c:"ENG", f:"🏴󠁧󠁢󠁥󠁮󠁧󠁿", n:"Inglaterra",                          t:20},
  {c:"CRO", f:"🇭🇷", n:"Croacia",                            t:20},
  {c:"GHA", f:"🇬🇭", n:"Ghana",                              t:20},
  {c:"PAN", f:"🇵🇦", n:"Panamá",                             t:20},
  {c:"FWC", f:"🏆", n:"FIFA World Cup – Historia (cont.)",  t:11, id:"FWC2"},
  {c:"CC",  f:"⭐", n:"Coca-Cola / Especiales",              t:14},
];

const TOTAL = 993;
let col={}, curFilter='all', curKey=null, mState={}, collName='', shareType='missing';

function gd(k){ return col[k]||{status:'',repeats:0,tradeWith:'',tradeFor:''}; }
function sid(s){ return s.id||s.c; }
function numOf(s,i){ return s.id==='FWC2' ? i+8 : i; }
function save(){ localStorage.setItem('p2026v4',JSON.stringify(col)); localStorage.setItem('p2026name',collName); }
function load(){
  try{ const d=localStorage.getItem('p2026v4'); if(d) col=JSON.parse(d); }catch(e){}
  const n=localStorage.getItem('p2026name'); if(n){ collName=n; document.getElementById('inp-name').value=n; }
}

window.onload=()=>{
  load();
  document.getElementById('inp-name').addEventListener('keydown',e=>{ if(e.key==='Enter') enterMain(); });
};

function enterMain(){
  const v=document.getElementById('inp-name').value.trim();
  if(!v){ document.getElementById('inp-name').focus(); return; }
  collName=v; save();
  document.getElementById('sw').style.display='none';
  document.getElementById('sm').style.display='block';
  document.getElementById('disp-name').textContent='👤 '+collName;
  renderAll(); updateStats();
}

// ─── RENDER ────────────────────────────────────────────────
function renderAll(){
  const ct=document.getElementById('mcontent'); ct.innerHTML='';
  ALBUM.forEach(sec=>{
    const id=sid(sec);
    const bl=document.createElement('div'); bl.className='sec-block'; bl.dataset.sid=id;
    const hdr=document.createElement('div'); hdr.className='sec-hdr';
    hdr.innerHTML=`<span class="sec-flag">${sec.f}</span><span class="sec-title">${sec.n}</span><span class="sec-code">${sec.c}</span><span class="sec-prog" id="sp-${id}"></span>`;
    bl.appendChild(hdr);
    const gr=document.createElement('div'); gr.className='sgrid';
    for(let i=1;i<=sec.t;i++){
      const num=numOf(sec,i), key=`${sec.c}${num}`, d=gd(key);
      const card=document.createElement('div'); card.className='stk';
      if(d.repeats>0) card.classList.add('rep'); else if(d.status==='have') card.classList.add('have');
      card.dataset.key=key; card.dataset.sid=id; card.dataset.sn=sec.n.toLowerCase();
      card.innerHTML=`<div class="rep-badge">${d.repeats>0?'+'+d.repeats:''}</div><div class="stk-code">${key}</div><div class="stk-chk">✅</div>`;
      card.addEventListener('click',()=>openModal(key,sec));
      gr.appendChild(card);
    }
    bl.appendChild(gr); ct.appendChild(bl);
  });
  updSecProg();
}

function updSecProg(){
  ALBUM.forEach(sec=>{
    const id=sid(sec); let owned=0;
    for(let i=1;i<=sec.t;i++){ const d=gd(`${sec.c}${numOf(sec,i)}`); if(d.status==='have'||d.repeats>0) owned++; }
    const el=document.getElementById('sp-'+id); if(el) el.textContent=`${owned}/${sec.t}`;
  });
}

function updateStats(){
  let have=0,rep=0,miss=0;
  ALBUM.forEach(sec=>{ for(let i=1;i<=sec.t;i++){ const d=gd(`${sec.c}${numOf(sec,i)}`); if(d.repeats>0) rep++; else if(d.status==='have') have++; else miss++; } });
  document.getElementById('cnt-have').textContent=have;
  document.getElementById('cnt-rep').textContent=rep;
  document.getElementById('cnt-miss').textContent=miss;
  const pct=Math.round(((have+rep)/TOTAL)*100);
  document.getElementById('pct-lbl').textContent=pct+'%';
  document.getElementById('prog-bar').style.width=pct+'%';
}

// ─── FILTERS ───────────────────────────────────────────────
function setFilter(f){
  curFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.className='fbtn');
  const m={all:'fa',have:'fg',repeat:'fo',missing:'fr'}, ids={all:'f-all',have:'f-have',repeat:'f-rep',missing:'f-miss'};
  document.getElementById(ids[f]).classList.add(m[f]);
  applyFilters();
}
function applyFilters(){
  const q=document.getElementById('sbox').value.toLowerCase();
  document.querySelectorAll('.sec-block').forEach(bl=>{
    let any=false;
    bl.querySelectorAll('.stk').forEach(card=>{
      const d=gd(card.dataset.key);
      const nm=!q||card.dataset.key.toLowerCase().includes(q)||card.dataset.sn.includes(q);
      let fm=true;
      if(curFilter==='have')    fm=d.status==='have'&&d.repeats===0;
      if(curFilter==='repeat')  fm=d.repeats>0;
      if(curFilter==='missing') fm=d.status!=='have'&&d.repeats===0;
      const v=nm&&fm; card.classList.toggle('hidden',!v); if(v) any=true;
    });
    bl.classList.toggle('hidden',!any);
  });
}

// ─── MODAL ─────────────────────────────────────────────────
function openModal(key,sec){
  curKey=key; const d=gd(key); mState={...d};
  document.getElementById('m-code').textContent=key;
  document.getElementById('m-team').textContent=`${sec.f} ${sec.n}`;
  document.getElementById('t-with').value=mState.tradeWith||'';
  document.getElementById('t-for').value=mState.tradeFor||'';
  syncM(); document.getElementById('stk-modal').classList.add('open');
}
function syncM(){
  document.getElementById('btn-have').classList.toggle('sel',mState.status==='have');
  document.getElementById('btn-miss').classList.toggle('sel',mState.status!=='have');
  document.getElementById('rep-val').textContent=mState.repeats||0;
  document.getElementById('trade-f').classList.toggle('vis',(mState.repeats||0)>0);
}
function toggleHave(){ mState.status='have'; syncM(); }
function toggleMiss(){ mState.status=''; mState.repeats=0; syncM(); }
function chgRep(d){ mState.repeats=Math.max(0,(mState.repeats||0)+d); if(mState.repeats>0) mState.status='have'; syncM(); }
function saveStk(){
  if(!curKey) return;
  col[curKey]={status:mState.status,repeats:mState.repeats||0,tradeWith:document.getElementById('t-with').value.trim(),tradeFor:document.getElementById('t-for').value.trim()};
  save(); refreshCard(curKey); updateStats(); updSecProg(); applyFilters(); closeModal();
}
function refreshCard(key){
  const card=document.querySelector(`.stk[data-key="${key}"]`); if(!card) return;
  const d=gd(key); card.classList.remove('have','rep');
  const rb=card.querySelector('.rep-badge');
  if(d.repeats>0){ card.classList.add('rep'); rb.textContent='+'+d.repeats; rb.style.display='block'; }
  else{ rb.style.display='none'; if(d.status==='have') card.classList.add('have'); }
}
function closeModal(){ document.getElementById('stk-modal').classList.remove('open'); curKey=null; }

// ─── SHARE ─────────────────────────────────────────────────
function goHome(){
  if(confirm('¿Regresar a la pantalla de inicio? Tu progreso está guardado.')){
    document.getElementById('sm').style.display='none';
    document.getElementById('sw').style.display='flex';
    document.getElementById('stk-modal').classList.remove('open');
    document.getElementById('share-modal').classList.remove('open');
  }
}
function openShare(){ document.getElementById('cv-preview').style.display='none'; document.getElementById('dl-btn').style.display='none'; document.getElementById('dl-a').style.display='none'; document.querySelectorAll('.sopt').forEach(e=>e.classList.remove('sel')); document.getElementById('share-modal').classList.add('open'); }
function closeShare(){ document.getElementById('share-modal').classList.remove('open'); }
function selShare(t){ shareType=t; document.querySelectorAll('.sopt').forEach(e=>e.classList.remove('sel')); document.getElementById('so-'+{missing:'miss',have:'have',repeat:'rep'}[t]).classList.add('sel'); }

function genImg(){
  const items=[];
  ALBUM.forEach(sec=>{ for(let i=1;i<=sec.t;i++){ const num=numOf(sec,i),key=`${sec.c}${num}`,d=gd(key); let inc=false; if(shareType==='missing') inc=d.status!=='have'&&d.repeats===0; if(shareType==='have') inc=d.status==='have'||d.repeats>0; if(shareType==='repeat') inc=d.repeats>0; if(inc) items.push({key,rep:d.repeats||0}); } });
  if(!items.length){ alert('No hay láminas en esta categoría.'); return; }
  const cols=Math.min(20,Math.ceil(Math.sqrt(items.length*1.6))), rows=Math.ceil(items.length/cols);
  const cw=52,ch=34,pad=18,hh=80, W=cols*cw+pad*2, H=rows*ch+pad*2+hh;
  const cv=document.getElementById('share-cv'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#050F28'); g.addColorStop(1,'#020810');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,215,0,0.07)'; ctx.fillRect(0,0,W,hh);
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,hh); ctx.lineTo(W,hh); ctx.stroke();
  ctx.textAlign='center';
  ctx.fillStyle='#FFD700'; ctx.font='bold 17px "Arial Black",Arial,sans-serif';
  ctx.fillText('⚽ PANINI FIFA WORLD CUP 2026',W/2,26);
  const lbl={missing:'❌ LÁMINAS QUE ME FALTAN',have:'✅ LÁMINAS QUE TENGO',repeat:'🔁 LÁMINAS REPETIDAS'};
  ctx.font='bold 10px Arial'; ctx.fillStyle='rgba(255,255,255,.65)'; ctx.fillText(lbl[shareType],W/2,43);
  ctx.fillStyle='#FFD700'; ctx.font='bold 11px Arial'; ctx.fillText('👤 '+collName+'  ·  '+items.length+' láminas',W/2,60);
  const cl={missing:{bg:'rgba(193,18,31,.28)',bd:'#C1121F',tx:'#FF9999'},have:{bg:'rgba(45,198,83,.22)',bd:'#2DC653',tx:'#99FFBB'},repeat:{bg:'rgba(245,158,11,.22)',bd:'#F59E0B',tx:'#FFD080'}}[shareType];
  items.forEach((s,i)=>{ const c=i%cols,r=Math.floor(i/cols),x=pad+c*cw,y=hh+pad+r*ch; ctx.fillStyle=cl.bg; ctx.strokeStyle=cl.bd; ctx.lineWidth=1; rr(ctx,x+1,y+1,cw-2,ch-2,4); ctx.fill(); ctx.stroke(); ctx.fillStyle=cl.tx; ctx.font='bold 9px Arial'; ctx.textAlign='center'; ctx.fillText(s.key,x+cw/2,y+ch/2+3); if(s.rep>0){ctx.fillStyle='#F59E0B';ctx.font='bold 7px Arial';ctx.fillText('+'+s.rep,x+cw-5,y+9);} });
  const url=cv.toDataURL('image/png');
  document.getElementById('cv-preview').src=url; document.getElementById('cv-preview').style.display='block';
  const a=document.getElementById('dl-a'); a.href=url; a.download=`panini2026-${shareType}-${collName}.png`; a.style.display='block';
  document.getElementById('dl-btn').style.display='block';
}
function rr(ctx,x,y,w,h,r){ ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath(); }

document.getElementById('stk-modal').addEventListener('click',e=>{ if(e.target===document.getElementById('stk-modal')) closeModal(); });
document.getElementById('share-modal').addEventListener('click',e=>{ if(e.target===document.getElementById('share-modal')) closeShare(); });

// ─── BOTÓN ATRÁS ANDROID ───────────────────────────────────
// Sobreescribe enterMain para empujar estado de historial
const _oe = enterMain;
enterMain = function(){
  _oe();
  history.pushState({v:'main'}, '');
};
// Sobreescribe openModal
const _om = openModal;
openModal = function(key, sec){
  _om(key, sec);
  history.pushState({v:'stk'}, '');
};
// Sobreescribe openShare
const _os = openShare;
openShare = function(){
  _os();
  history.pushState({v:'share'}, '');
};
// Intercepta popstate (botón atrás físico Android)
window.addEventListener('popstate', () => {
  if(document.getElementById('stk-modal').classList.contains('open')){
    closeModal(); history.pushState({v:'main'},''); return;
  }
  if(document.getElementById('share-modal').classList.contains('open')){
    closeShare(); history.pushState({v:'main'},''); return;
  }
  if(document.getElementById('sm').style.display !== 'none'){
    history.pushState({v:'main'},'');
  }
});

if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }
</script>
